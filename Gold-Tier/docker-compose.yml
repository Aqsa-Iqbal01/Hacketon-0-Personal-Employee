services:
  db:
    image: postgres:16
    container_name: odoo_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks:
      - odoo_net

  odoo:
    image: odoo:19.0
    container_name: odoo_app
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo_data:/var/lib/odoo
    networks:
      - odoo_net

networks:
  odoo_net:
    driver: bridge

volumes:
  odoo_db_data:
  odoo_data:
